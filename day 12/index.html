<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dzień 12 - Filler Day</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: linear-gradient(135deg, #ffcccc, #ffe6e6);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .scene {
    position: relative;
    background-color: #fff0f0;
    border: 5px solid #ff66a3;
    border-radius: 15px;
    padding: 30px 20px 50px 20px;
    max-width: 400px;
    box-shadow: 8px 8px 0 #ff66a3;
    text-align: center;
  }

  .character {
    width: 120px;
    height: 120px;
    background-color: #fff;
    border: 3px solid #ff66a3;
    border-radius: 10px;
    display: inline-block;
    position: relative;
    cursor: pointer;
    margin-top: 20px;
  }

  .character img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .speech-bubble {
    position: absolute;
    top: -90px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff99cc;
    color: #000;
    padding: 10px;
    border-radius: 10px;
    border: 3px solid #ff66a3;
    font-size: 12px;
    max-width: 250px;
    min-height: 50px;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -15px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 15px 10px 0 10px;
    border-style: solid;
    border-color: #ff99cc transparent transparent transparent;
  }

  .lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .lightbox img {
    max-width: 80%;
    max-height: 80%;
    border: 5px solid #ff66a3;
    border-radius: 15px;
  }

  .lightbox .selfie-caption {
    margin-top: 10px;
    font-size: 14px;
    color: #fff;
  }

  .caption {
    margin-top: 20px;
    font-size: 8px;
    color: #ff66a3;
  }

  .text {
    margin-top: 55px;
    color: black;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="scene">
<div class="text">Justyna</div>
  <div class="speech-bubble" id="speech">
  </div>
  
  <div class="character" id="character">
    <img src="pixel_character.jpg" alt="Pixelowa Justyna">
  </div>

  <div class="caption">Kliknij na Justynę, żeby odsłonić</div>

  <div class="lightbox" id="lightbox">
    <img src="1000050026.jpg" alt="Justyna wysyła całusa">
    <div class="selfie-caption">Buziak 💋</div>
  </div>
</div>

<script>
  const speech = document.getElementById('speech');
  const character = document.getElementById('character');
  const lightbox = document.getElementById('lightbox');

  const message = "Ej… to wcale nie jest takie łatwe wymyślać coś innego codziennie, więc dziś masz tylko to 👇";

  let i = 0;
  function typeWriter() {
    if (i < message.length) {
      speech.innerHTML += message.charAt(i);
      i++;
      setTimeout(typeWriter, 40);
    }
  }
  typeWriter();

  character.addEventListener('click', () => {
    lightbox.style.display = 'flex';
  });

  lightbox.addEventListener('click', () => {
    lightbox.style.display = 'none';
  });
</script>

</body>
</html>
