<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: #fff8f0;
    color: #333;
    overflow-x: hidden;
  }

  h1 { margin-bottom: 6px; }
  p { margin-top: 5px; margin-bottom: 5px; }

  #board {
    display: grid;
    grid-template-rows: repeat(6, auto);
    grid-gap: 3px;
    margin-top: 10px;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(7, 4vw);
    grid-gap: 6px;
    max-width: 95vw;
  }

  .cell {
    width: 4vw;
    height: 4vw;
    border: 2px solid #ccc;
    text-align: center;
    line-height: 4vw;
    font-size: 2vw;
    font-weight: bold;
    text-transform: uppercase;
    background-color: #fff;
  }

  .correct { background-color: #6aaa64; color: white; border-color: #6aaa64; }
  .present { background-color: #c9b458; color: white; border-color: #c9b458; }
  .absent  { background-color: #787c7e; color: white; border-color: #787c7e; }

  #message {
    margin-top: 20px;
    font-size: 18px;
    text-align: center;
    max-width: 300px;
  }

  input { font-size: 22px; width: 180px; padding: 5px; text-transform: uppercase; text-align: center; }
  button { margin-top: 10px; font-size: 18px; padding: 6px 12px; cursor: pointer; }

  /* konfetti */
  .confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 14px;
    opacity: 0.9;
    animation: fall 3s linear forwards;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(360deg);
      opacity: 0.6;
    }
  }
</style>
</head>
<body>

<h1>Wordle</h1>
<p>Zgadnij hasło (7 liter):</p>
<input type="text" id="guessInput" maxlength="7" autofocus>
<button onclick="submitGuess()">Sprawdź</button>

<div id="board"></div>
<div id="message"></div>

<script>
const secretWord = "BARSZCZ";
let attempts = 0;
const maxAttempts = 6;

const board = document.getElementById("board");
const message = document.getElementById("message");

// tworzenie planszy
for(let i=0;i<maxAttempts;i++){
    const row = document.createElement("div");
    row.classList.add("row");
    for(let j=0;j<secretWord.length;j++){
        const cell = document.createElement("div");
        cell.classList.add("cell");
        row.appendChild(cell);
    }
    board.appendChild(row);
}

// konfetti z opóźnieniem
function launchConfetti() {
    for (let i = 0; i < 70; i++) {
        setTimeout(() => {
            const conf = document.createElement("div");
            conf.classList.add("confetti");
            conf.style.left = Math.random() * 100 + "vw";
            conf.style.backgroundColor = `hsl(${Math.random()*360}, 90%, 60%)`;
            conf.style.transform = `rotate(${Math.random()*360}deg)`;
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 3000);
        }, i * 50);
    }
}

function submitGuess(){
    const input = document.getElementById("guessInput");
    let guess = input.value.toUpperCase();

    if(guess.length !== secretWord.length){
        alert("Hasło ma 7 liter!");
        return;
    }

    const row = board.children[attempts];
    for(let i=0;i<secretWord.length;i++){
        const cell = row.children[i];
        cell.textContent = guess[i];

        if(guess[i] === secretWord[i]){
            cell.classList.add("correct");
        } else if(secretWord.includes(guess[i])){
            cell.classList.add("present");
        } else {
            cell.classList.add("absent");
        }
    }

    attempts++;
    input.value = "";
    input.focus();

    if(guess === secretWord){
        message.innerHTML =
          "Może to i Ty najczęściej okupujesz moje myśli,<br>ale świąteczny barszczyk ostatnio też chodzi mi po głowie 😋❤️";

        input.disabled = true;

        launchConfetti(); // tylko konfetti
        return;
    }

    if(attempts >= maxAttempts){
        message.innerHTML = `Niestety, nie udało się. Hasło to: ${secretWord}`;
        input.disabled = true;
    }
}
</script>

</body>
</html>
