<!DOCTYPE html>
<html lang="pl">
<head>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koło Fortuny</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(to right, #ffaad6, #ffffc1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
    h1 {
      font-family: 'Baloo 2', cursive;
      font-size: 2.5em;
      color: #ff6666;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
  #wheel {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 8px solid #fff;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
    background: conic-gradient(
      #ff9999 0deg 36deg,
      #99ccff 36deg 72deg,
      #99ff99 72deg 108deg,
      #ffcc99 108deg 144deg,
      #ffb6c1 144deg 180deg,
      #add8e6 180deg 216deg,
      #90ee90 216deg 252deg,
      #ffa07a 252deg 288deg,
      #f08080 288deg 324deg,
      #dda0dd 324deg 360deg
    );
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
  }
  #pointer {
    width: 0; 
    height: 0; 
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 40px solid #333;
    position: absolute;
    top: -40px;
  }
  button {
    margin-top: 30px;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    background-color: #ff6666;
    color: white;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  }
  #result {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    color: #333;
    text-align: center;
  }
</style>
</head>
<body>

<h1>🍀Koło Fortuny🍀</h1>
<div id="wheel">
  <div id="pointer"></div>
</div>
<button onclick="spinWheel()">Kręć kołem!</button>
<div id="result"></div>

<script>
const prizes = [
  "50 przytulasów 🤍",
  "100 całusów 😘",
  "10 całusów 😘",
  "Buziak w czółko 😘",
  "Buziak w policzek 😘",
  "100 przytulasów 🤍🤍",
  "1 wspólny film 🎬",
  "Spacer razem 🚶‍♂️🚶‍♀️"
];

let currentRotation = 0;

function spinWheel() {
  const wheel = document.getElementById('wheel');
  const resultDiv = document.getElementById('result');

  const extraRotation = Math.floor(Math.random() * 360) + 720; 
  currentRotation += extraRotation;

  wheel.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(() => {
    const normalizedDegree = currentRotation % 360;
    let prizeIndex = Math.floor(normalizedDegree / 36);
    prizeIndex = (9 - prizeIndex) % 10;

    const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
    resultDiv.textContent = `Wygrałeś: ${randomPrize}! 🎉`;
  }, 4000);
}
</script>

</body>
</html>
