<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gra w Memory </title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    margin: 0;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #fff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  }

  #game-board {
    display: grid;
    grid-gap: 15px;
    width: 100%;
    max-width: 720px;
  }

  @media (min-width: 700px) {
    #game-board {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  @media (max-width: 699px) and (min-width: 500px) {
    #game-board {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (max-width: 499px) {
    #game-board {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  .card {
    position: relative;
    width: 100%;
    padding-top: 70%;
    cursor: pointer;
    perspective: 800px;
  }

  .card-inner {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    border-radius: 12px;
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    text-align: center;
    padding: 10px;
    box-sizing: border-box;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  .card-front {
    background: #6c5ce7;
    color: white;
    font-size: 20px;
  }

  .card-back {
    background: #ffeaa7;
    color: #2d3436;
    transform: rotateY(180deg);
    font-size: 14px;
  }

  .card.flipped .card-back {
    animation: pop 0.3s ease-out;
  }

  @keyframes pop {
    0% { transform: rotateY(180deg) scale(0.8); }
    50% { transform: rotateY(180deg) scale(1.05); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  #message {
    margin-top: 40px;
    max-width: 550px;
    text-align: center;
    font-size: 18px;
    color: #fff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<h1>Memory🧠</h1>
<div id="game-board"></div>
<div id="message"></div>

<script>
const pairs = [
  ["Justyna", "Krzysztof"],
  ["Polska", "Hong Kong"],
  ["5°C", "25°C"],
  ["Dobranoc", "Dzień dobry"],
  ["UTC+1", "UTC+8"],
  ["Pierogi", "Dim sum"],
  ["Tęsknię", "Ja też"],
  ["Zimowa kurtka", "T-shirt"]
];

let cards = [];
pairs.forEach(pair => {
  cards.push({name: pair[0], pair: pair[1]});
  cards.push({name: pair[1], pair: pair[0]});
});
cards.sort(() => Math.random() - 0.5);

const board = document.getElementById('game-board');
let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matches = 0;

cards.forEach(cardData => {
  const card = document.createElement('div');
  card.classList.add('card');
  
  const inner = document.createElement('div');
  inner.classList.add('card-inner');
  
  const front = document.createElement('div');
  front.classList.add('card-front');
  front.textContent = "?";
  
  const back = document.createElement('div');
  back.classList.add('card-back');
  back.textContent = cardData.name;
  
  inner.appendChild(front);
  inner.appendChild(back);
  card.appendChild(inner);
  
  card.addEventListener('click', () => flipCard(card, cardData));
  
  board.appendChild(card);
});

function flipCard(card, cardData) {
  if (lockBoard || card.classList.contains('flipped')) return;
  
  card.classList.add('flipped');
  
  if (!firstCard) {
    firstCard = {card, data: cardData};
  } else {
    secondCard = {card, data: cardData};
    checkMatch();
  }
}

function checkMatch() {
  lockBoard = true;
  if (firstCard.data.pair === secondCard.data.name) {
    matches += 1;
    resetTurn();
    if (matches === pairs.length) {
      showMessage();
    }
  } else {
    setTimeout(() => {
      firstCard.card.classList.remove('flipped');
      secondCard.card.classList.remove('flipped');
      resetTurn();
    }, 1000);
  }
}

function resetTurn() {
  [firstCard, secondCard] = [null, null];
  lockBoard = false;
}

function showMessage() {
  document.getElementById('message').innerHTML = 
    "Na razie dzieli nas sporo różnic — miejsca, temperatura, strefy czasowe… i 8 452,02 km między Sosnowcem a Hongkongiem.<br>Ale już niedługo będzie Polska–Polska, ta sama temperatura, ta sama strefa czasowa i 8 452,02 km zmieni się w 0. ❤️";
}
</script>

</body>
</html>
