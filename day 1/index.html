<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dzień 1 – Wirtualna Justyna</title>
<style>
body {
  background: linear-gradient(#a2c5ff, #cce0ff);
  font-family: 'Press Start 2P', monospace;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  margin: 0;
  color: #002255;
  position: relative;
}

/* --- animowane chmurki --- */
.cloud {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: moveClouds 60s linear infinite;
  filter: blur(2px);
}

.cloud::before,
.cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}

.cloud::before {
  width: 80%;
  height: 80%;
  top: -40%;
  left: 10%;
}

.cloud::after {
  width: 60%;
  height: 60%;
  top: -20%;
  right: -20%;
}

@keyframes moveClouds {
  0% { transform: translateX(-200px); }
  100% { transform: translateX(110vw); }
}

/* --- układ --- */
.container {
  display: flex;
  align-items: flex-end;
  gap: 40px;
  padding-left: 80px;
}

/* --- ramka postaci --- */
.character-frame {
  background: #d9e8ff;
  border: 3px solid #0044aa;
  border-radius: 20px;
  padding: 12px 12px 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 160px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.pixel-justyna {
  width: 130px;
  height: auto;
  image-rendering: pixelated;
}

.name-tag {
  margin-top: 6px;
  font-size: 10px;
  color: #0044aa;
  background: #cde2ff;
  border: 2px solid #0044aa;
  border-radius: 10px;
  padding: 3px 6px;
}

/* --- dymek dialogowy --- */
.dialogue-box {
  background: #d9e8ff;
  border: 4px solid #0044aa;
  border-radius: 12px;
  padding: 20px;
  width: 600px;
  font-size: 14px;
  line-height: 1.6;
  position: relative;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

.dialogue-box::after {
  content: "";
  position: absolute;
  left: -20px;
  bottom: 40px;
  border-width: 10px 20px 10px 0;
  border-style: solid;
  border-color: transparent #0044aa transparent transparent;
}

/* --- przyciski i tekst --- */
.option-buttons {
  margin-top: 20px;
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}

.option-buttons button {
  background: #5d8eff;
  color: white;
  border: none;
  padding: 8px 12px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.2s;
}

.option-buttons button:hover {
  background: #0044aa;
}

#continue {
  display: none;
  color: #003388;
  font-size: 10px;
  margin-top: 10px;
  opacity: 0.8;
}

/* --- prezent --- */
#gift {
  display: none;
  position: absolute;
  top: 25%; /* przesunięcie lekko do góry */
  left: 50%;
  transform: translate(-50%, -50%);
  background: #cde2ff;
  border: 3px solid #0044aa;
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  animation: fadeIn 1.5s ease forwards;
  z-index: 5;
}

#gift img {
  width: 120px;
  cursor: pointer;
  animation: floatGift 2s ease-in-out infinite;
  image-rendering: pixelated;
}

#gift p {
  font-size: 12px;
  color: #002255;
  margin-top: 10px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translate(-50%, -50%) scale(0.8);}
  to {opacity: 1; transform: translate(-50%, -50%) scale(1);}
}

@keyframes floatGift {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<!-- Chmurki -->
<div class="cloud" style="top: 20%; left: -150px; width: 150px; height: 70px; animation-delay: 0s;"></div>
<div class="cloud" style="top: 40%; left: -300px; width: 200px; height: 90px; animation-delay: 10s; opacity:0.5;"></div>
<div class="cloud" style="top: 65%; left: -250px; width: 180px; height: 80px; animation-delay: 25s; opacity:0.6;"></div>

<!-- prezent -->
<div id="gift">
  <img src="https://cdn-icons-png.flaticon.com/128/6160/6160448.png" id="present" alt="Prezent">
  <p id="giftText">Kliknij, aby otworzyć 🎁</p>
</div>

<div class="container">
  <!-- Postać -->
  <div class="character-frame">
    <img src="pixel_character.jpg" alt="Pixel Justyna" class="pixel-justyna">
    <div class="name-tag">Justyna</div>
  </div>

  <!-- Dymek i tekst -->
  <div>
    <div class="dialogue-box" id="dialogue"></div>
    <div id="continue">[Kliknij Enter, aby kontynuować]</div>
    <div class="option-buttons" id="options" style="display:none;">
      <button data-reply="1">Oczywiście</button>
      <button data-reply="2">Jezu co ty znowu wymyśliłaś kobieto</button>
      <button data-reply="3">Nie</button>
    </div>
  </div>
</div>

<script>
const dialogue = document.getElementById('dialogue');
const continueText = document.getElementById('continue');
const options = document.getElementById('options');
const gift = document.getElementById('gift');
const giftText = document.getElementById('giftText');

const dialogues = [
  "Cześć Krzysiu 💌",
  "Przygotowałam Ci małą niespodziankę, żeby te ostatnie 20 dni przed naszym spotkaniem szybciej zleciały i żeby jakoś umilić Ci ten czas.",
  "Ja pewnie jestem teraz zabiegana i zajęta egzaminami czy ogarnianiem ostatnich rzeczy tutaj w Hong Kongu, więc jako że mogę nie mieć tak dużo czasu, chciałam Ci przygotować drobny prezent, żeby Ci to wynagrodzić.",
  "Dlatego zrobiłam ten wirtualny kalendarz adwentowy, ale tylko na 20 dni, bo dokładnie za tyle czasu się widzimy :)",
  "Mam nadzieję, że Ci się spodoba <3 Gotowy?"
];

let index = 0;
let isTyping = false;

function typeText(text, callback) {
  let i = 0;
  isTyping = true;
  dialogue.textContent = "";
  const interval = setInterval(() => {
    dialogue.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      isTyping = false;
      if (callback) callback();
    }
  }, 25);
}

function nextDialogue() {
  if (isTyping) return;
  if (index < dialogues.length) {
    typeText(dialogues[index], () => {
      index++;
      continueText.style.display = "block";
    });
  } else {
    continueText.style.display = "none";
    options.style.display = "flex";
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === "Enter" && !isTyping) {
    continueText.style.display = "none";
    nextDialogue();
  }
});

options.addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON') {
    const reply = e.target.getAttribute('data-reply');
    options.style.display = "none";
    if (reply === "1") {
      typeText("Okej, to tu Twoja pierwsza nagroda na dzisiaj 🎁");
    } else if (reply === "2") {
      typeText("No co nie, masakra no 😅 Miłej zabawy! Tu Twoja pierwsza nagroda na dzisiaj 🎁");
    } else {
      typeText("😢 ...to masz problem, i tak Ci to pokażę! Tu Twoja pierwsza nagroda na dzisiaj 🎁");
    }
    // Wyświetl prezent po sekundowym opóźnieniu
    setTimeout(() => { gift.style.display = "block"; }, 3000);
  }
});

document.getElementById('present').addEventListener('click', () => {
  giftText.innerHTML = '🎬 Oto reels na poprawę humoru:<br><a href="https://www.instagram.com/reel/DMfjMylCxwb/?igsh=MWx4aTNhbDkweWFpYw==" target="_blank">[kliknij tutaj]</a>';
});

nextDialogue();
</script>
</body>
</html>
