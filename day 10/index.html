<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dzień 10 — UNO Reverse Card</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  body{
    margin:0;
    padding:0;
    font-family:"Poppins", sans-serif;
    background: linear-gradient(180deg,#f7f5ff,#ecf7ff);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    color:#111827;
  }

  h1{
    font-size:26px;
    margin-bottom:8px;
  }

  p{
    max-width:360px;
    margin:0 auto 20px;
    font-size:15px;
    color:#374151;
  }

  .card-scene{
    perspective:900px;
    width:255px;
    height:390px;
    margin-bottom:20px;
  }

  .card{
    width:100%;
    height:100%;
    border-radius:20px;
    transform-style:preserve-3d;
    transition: transform 700ms cubic-bezier(.2,.9,.2,1);
    cursor:pointer;
    box-shadow: 0 18px 40px rgba(2,6,23,0.18);
    position:relative;
  }

  .card.is-flipped{
    transform: rotateY(180deg) scale(1.03);
  }

  .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    font-weight:900;
    font-size:36px;
    color:white;
  }

  .front {
    background-image: url('uno_reverse.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .back{
    transform:rotateY(180deg);
    background: #0849a3;
    border: 16px solid white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    padding:20px;
  }

  .back-text{
    font-size:17px;
    font-weight:700;
    line-height:1.4;
    text-align:center;
    margin:0 10px;
    color:white;
  }

</style>
</head>
<body>

  <h1>Dzień 10 — UNO Reverse Card</h1>
  <p>Kliknij kartę, żeby zobaczyć dzisiejsze zadanie✨</p>

  <div class="card-scene">
    <div id="card" class="card">
      <div class="face front"></div>

      <div class="face back">
        <div class="back-text">
          UNO Reverse!<br><br>
          A może tak dla odmiany<br>
          <b>Ty</b> zrobisz mi dziś prezent… <br><br>
          Wyślij mi swoje zdjęcie na umilenie dnia 📸<br>
          (na naszym czacie na Instagramie poproszę💛)
        </div>
      </div>

    </div>
  </div>

<script>
  const card = document.getElementById('card');
  card.addEventListener('click', () => {
    card.classList.toggle('is-flipped');
  });
</script>

</body>
</html>
